<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG Concrete Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">MG</div>
      <div>
        <h1>MG Concrete</h1>
        <p>كتالوج المنتجات والطلبات</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="intro-card">
      <h2>اختار منتجاتك</h2>
      <p>اختار الشكل، نوع التشطيب، والكمية. في الآخر ابعت الطلب واتساب.</p>
    </section>

    <section id="products" class="products-grid" aria-label="المنتجات"></section>

    <section class="cart-card" id="cart-section">
      <div class="section-title">
        <h2>🛒 سلة الطلب</h2>
        <span id="cart-count">0 منتج</span>
      </div>

      <div id="cart-items" class="cart-items empty-cart">لسه مفيش منتجات في الطلب</div>

      <div class="total-row">
        <span>إجمالي الطلب</span>
        <strong id="order-total">0 جنيه</strong>
      </div>

      <div class="customer-form">
        <label>
          اسم العميل
          <input id="customer-name" type="text" placeholder="اكتب اسمك" />
        </label>

        <label>
          رقم التليفون
          <input id="customer-phone" type="tel" placeholder="01xxxxxxxxx" />
        </label>

        <label>
          ملاحظات
          <textarea id="order-notes" rows="3" placeholder="مثال: اللون أبيض، الاستلام يوم الجمعة"></textarea>
        </label>
      </div>

      <button id="send-whatsapp" class="whatsapp-btn">إرسال الطلب على واتساب</button>
    </section>
  </main>

  <footer>
    <p>MG Concrete © كتالوج تجريبي</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
